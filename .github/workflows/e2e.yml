name: e2e

# Runs the Playwright suite as a merge gate on PRs, and again on main after merge.
# Scoped with paths so unrelated changes (docs, etc.) don't spend CI minutes.
on:
  pull_request:
    paths:
      - 'e2e/**'
      - 'projects/**'
      - 'playwright.config.ts'
      - 'seed-data/**'
      - 'firebase.json'
      - 'firestore.rules'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/e2e.yml'
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # Reads the pinned version from package.json's "packageManager" field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache the browser binaries (~150MB) keyed on the lockfile, which changes
      # whenever @playwright/test (and thus the required browser build) changes.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      # On a cache hit, only the OS-level shared libraries still need installing;
      # on a miss this also downloads the chromium build. Both paths are idempotent.
      - name: Install Playwright Chromium + system deps
        run: pnpm exec playwright install --with-deps chromium

      # `pnpm e2e` wraps `playwright test` in `firebase emulators:exec` (seeded from
      # seed-data/), which owns the emulator lifecycle; Playwright's webServer boots
      # the two Angular dev servers. CI=true → reuseExistingServer:false + 2 retries.
      - name: Run e2e suite
        run: pnpm e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
