<div class="page-container p-6">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl">Categories</h1>
    <button mat-flat-button color="primary" (click)="onAdd()">
      <mat-icon>add</mat-icon>
      Add Category
    </button>
  </div>

  @if (categoryStore.loading()) {
    <div class="flex justify-center py-12">
      <mat-spinner diameter="48" />
    </div>
  } @else if (categoryStore.error()) {
    <p class="text-red-400">{{ categoryStore.error() }}</p>
  } @else if (categoryStore.categories().length === 0) {
    <p class="text-gray-400 py-8 text-center">No categories yet. Click "Add Category" to create one.</p>
  } @else {
    <table mat-table [dataSource]="categoryStore.categories()" class="w-full">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let category">{{ category.name }}</td>
      </ng-container>

      <ng-container matColumnDef="slug">
        <th mat-header-cell *matHeaderCellDef>Slug</th>
        <td mat-cell *matCellDef="let category">{{ category.slug }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let category">
          <button mat-icon-button aria-label="Edit category" (click)="onEdit(category.id)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button aria-label="Delete category" color="warn" (click)="onDelete(category.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  }
</div>
