<div class="page-container p-6 max-w-lg">
  <div class="flex items-center gap-2 mb-6">
    <button mat-icon-button aria-label="Back to tags" (click)="onCancel()">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h1 class="text-2xl">Add Tag</h1>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
    <mat-form-field>
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" (input)="onNameInput()" />
      @if (form.controls.name.hasError('required')) {
        <mat-error>Name is required</mat-error>
      }
    </mat-form-field>

    <mat-form-field>
      <mat-label>Slug</mat-label>
      <input matInput formControlName="slug" />
      @if (form.controls.slug.hasError('required')) {
        <mat-error>Slug is required</mat-error>
      }
    </mat-form-field>

    <div class="flex gap-3">
      <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">Save</button>
      <button mat-stroked-button type="button" (click)="onCancel()">Cancel</button>
    </div>
  </form>
</div>
