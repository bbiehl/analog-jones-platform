<div class="page-container p-6">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl">Genres</h1>
    <button mat-flat-button color="primary" (click)="onAdd()">
      <mat-icon>add</mat-icon>
      Add Genre
    </button>
  </div>

  @if (genreStore.loading()) {
    <div class="flex justify-center py-12">
      <mat-spinner diameter="48" />
    </div>
  } @else if (genreStore.error()) {
    <p class="text-red-400">{{ genreStore.error() }}</p>
  } @else if (genreStore.genres().length === 0) {
    <p class="text-gray-400 py-8 text-center">No genres yet. Click "Add Genre" to create one.</p>
  } @else {
    <table mat-table [dataSource]="genreStore.genres()" class="w-full">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let genre">{{ genre.name }}</td>
      </ng-container>

      <ng-container matColumnDef="slug">
        <th mat-header-cell *matHeaderCellDef>Slug</th>
        <td mat-cell *matCellDef="let genre">{{ genre.slug }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let genre">
          <button mat-icon-button aria-label="Edit genre" (click)="onEdit(genre.id)">
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            aria-label="Bulk edit episodes in genre"
            (click)="onBulkEdit(genre.id)"
          >
            <mat-icon>playlist_add_check</mat-icon>
          </button>
          <button mat-icon-button aria-label="Delete genre" color="warn" (click)="onDelete(genre.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  }
</div>
