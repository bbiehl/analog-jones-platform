<div class="tape-file-skel" aria-busy="true" aria-label="Loading episode dossier">
  <aside class="sleeve-skel" aria-hidden="true">
    <div class="cover-skel pulse">
      <div class="cover-scan"></div>
    </div>
  </aside>

  <section class="body-skel" aria-hidden="true">
    <div class="head-skel">
      <div class="eyebrow-skel pulse"></div>
      <div class="title-rows">
        <div class="pulse h-title"></div>
        <div class="pulse h-title w-half"></div>
      </div>
      <div class="sub-skel pulse"></div>
    </div>

    <div class="chips-skel">
      <div class="pulse h-chip w-chip-a"></div>
      <div class="pulse h-chip w-chip-b"></div>
      <div class="pulse h-chip w-chip-c"></div>
      <div class="pulse h-chip w-chip-a"></div>
      <div class="pulse h-chip w-chip-b"></div>
    </div>

    <div class="tx-skel">
      <div class="tx-head-skel">
        <div class="pulse h-head-label w-header"></div>
        <div class="pulse h-head-label w-meta"></div>
      </div>
      <div class="tx-body-skel">
        <div class="pulse h-line"></div>
        <div class="pulse h-line"></div>
        <div class="pulse h-line w-80"></div>
        <div class="pulse h-line w-60"></div>
        <div class="pulse h-line"></div>
        <div class="pulse h-line w-70"></div>
      </div>
    </div>
  </section>
</div>
