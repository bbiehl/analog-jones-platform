<section class="block" [attr.aria-label]="ariaLabel()" [attr.aria-busy]="loading() ? 'true' : null">
  <div class="page">
    @if (heading(); as h) {
      <h2 class="grid-heading">{{ h }}</h2>
    }
    @if (loading()) {
      <div class="episode-grid" aria-hidden="true">
        @for (slot of skeletonSlots; track slot) {
          <div class="card card--skeleton"></div>
        }
      </div>
    } @else {
      <div class="episode-grid" role="list">
        @for (ep of episodes(); track ep.id) {
          <article class="card" role="listitem">
            <a [routerLink]="[routerPrefix(), ep.id]" [attr.aria-label]="ep.title">
              <div class="meta">
                <span>{{ toDate(ep) | date: 'MMM dd · yyyy' | uppercase }}</span>
              </div>
              <div class="name">{{ ep.title }}</div>
            </a>
          </article>
        }
      </div>
    }
  </div>
</section>
