<section class="p-6">
  <h1>Explorer</h1>
  <p>Browse episodes by category, genre, or tag.</p>

  <nav class="mt-6 mb-8 grid grid-cols-[repeat(auto-fit,minmax(180px,1fr))] gap-4" aria-label="Explorer sections">
    <a routerLink="categories" class="no-underline text-inherit">
      <mat-card>
        <mat-card-content class="flex items-center gap-3 p-4 text-lg">
          <mat-icon>folder</mat-icon>
          <span>Categories</span>
        </mat-card-content>
      </mat-card>
    </a>

    <a routerLink="genres" class="no-underline text-inherit">
      <mat-card>
        <mat-card-content class="flex items-center gap-3 p-4 text-lg">
          <mat-icon>library_music</mat-icon>
          <span>Genres</span>
        </mat-card-content>
      </mat-card>
    </a>

    <a routerLink="tags" class="no-underline text-inherit">
      <mat-card>
        <mat-card-content class="flex items-center gap-3 p-4 text-lg">
          <mat-icon>label</mat-icon>
          <span>Tags</span>
        </mat-card-content>
      </mat-card>
    </a>
  </nav>

  <router-outlet />
</section>
