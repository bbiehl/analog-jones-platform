<section class="page-frame pt-6">
  <header>
    <h1 class="text-3xl font-bold mb-4">Episodes</h1>
    <p class="mb-6">Browse all available episodes, newest first.</p>
  </header>

  <div class="search">
    <label class="sr-only" for="episode-search">Search episodes by title</label>
    <input
      id="episode-search"
      type="search"
      class="search-input"
      placeholder="Search by title"
      autocomplete="off"
      [formControl]="searchControl"
    />
  </div>

  @if (loading()) {
    <app-episode-grid [loading]="true" ariaLabel="Loading episodes" />
  } @else if (!hasResults() && error(); as message) {
    <p role="alert" class="state-message">{{ message }}</p>
  } @else {
    <div aria-live="polite">
      @if (hasResults()) {
        <app-episode-grid [episodes]="filtered()" ariaLabel="Episodes" />
      } @else if (hasSearch()) {
        <p class="state-message">No episodes match your search.</p>
      } @else {
        <p class="state-message">No episodes found.</p>
      }
    </div>
  }
</section>
